spring.application.name=smartCampus

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/Smart_Campus?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.connection.characterEncoding=utf8
spring.jpa.properties.hibernate.connection.useUnicode=true

# Server Configuration
server.port=8090

# Session Configuration
server.servlet.session.timeout=30m

# Multipart file upload (for course files)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB


# Logging
logging.level.root=INFO
logging.level.org.example.smartcampus=DEBUG
